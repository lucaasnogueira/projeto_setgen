services:
  - type: web
    name: portal-setgen-api
    runtime: node
    plan: free
    rootDir: portal-setgen-api
    # --include=dev: NODE_ENV=production senão pula devDeps e nest CLI some (exit 127)
    # db seed é idempotente (upsert) — cria admin/gerente/tecnico sem duplicar
    buildCommand: npm install --include=dev && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 8h
      - key: CORS_ORIGIN
        sync: false
      - key: CNPJ_API_URL
        value: https://brasilapi.com.br/api/cnpj/v1
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_PATH
        value: ./uploads
